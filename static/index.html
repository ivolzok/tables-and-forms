<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <!--Форму размещай тут-->
    <form action="/pets/orders" method="post">
        <label>
            Тип питомца
            <select name="petType">
                <option value="cat" selected>Кошка</option>
                <option value="dog">Собака</option>
                <option value="capibara">Капибара</option>
            </select>
        </label>

        <label>
            <input type="radio" name="gender" value="male" checked> Мужской
            <input type="radio" name="day" value="female"> Женский
        </label>

        <label>
            Цвет питомца
            <input type = "color" name = "eyeColor">
        </label>

        <label>
            Длина хвоста, см
            <input type = "number" name = "tailLength">
        </label>

        <label>
            Имя
            <input type = "text" name = "name">
        </label>

        <label>
            Дата рождения
            <input type="date" name="dateOfBirth" required value="2004-04-12">
        </label>

        <label>
            Email
            <input type="email" name="email" placeholder="email@example.com" required value="op81@google.com">
        </label>

        <label>
            Номер телефона
            <input type="tel" name="phone" placeholder="+7__________" required value="+79530526216">
        </label>

        <label>
            Согласен с правилами использования сервиса
            <input type="checkbox" name="rules" value="true" required>
        </label>

        <button name="submit">
             Отправить
        </button>
    </form>

</main>
</body>
</html>
