<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <!--Форму размещай тут-->
    <form action="/pets/orders" method="post">
        <label>
            Тип питомца
            <select name="petType">
                <option value="cat">Кошка</option>
                <option value="dog">Собака</option>
                <option value="tiger" selected>Тигр</option>
            </select>
        </label>

        <label>
            <input type="radio" name="gender" value="boy" checked> Мужской
            <input type="radio" name="gender" value="girl"> Женский
            <input type="radio" name="gender" value="none"> Не придумал
        </label>

        <label>
            Цвет питомца
            <input type = "color" name = "eyeColor">
        </label>

        <label>
            Длина хвоста, см
            <input type = "number" name = "tailLength" placeholder="10" min="7" max="120" required>
        </label>

        <label>
            Имя
            <input type = "text" name = "name" placeholder="Муся" minlength="3" maxlength="50" required>
        </label>

        <label>
            Дата рождения
            <input type="date" name="dateOfBirth" required value="2004-04-12">
        </label>

        <label>
            Email
            <input type="email" name="email" placeholder="email@example.com" required value="op81@google.com">
        </label>

        <label>
            Номер телефона
            <input type="tel" name="phone" placeholder="+7__________" required value="+79530526216">
        </label>

        <label>
            Согласен с правилами использования сервиса
            <input type="checkbox" name="rules" value="true" required>
        </label>

        <button type="submit"> Отправить </button>
        <button type="reset">Отменить</button>
    </form>

</main>
</body>
</html>
